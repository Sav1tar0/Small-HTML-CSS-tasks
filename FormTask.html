<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="border: 5px solid black; display: flex; justify-content: center;">
    <form >
    <h1 style="justify-content: center;">Registeration Form</h1>
    <p><small>Enter your informations and choose your choices</small></p>
    <hr>
    <label for="Name">Name: </label>
    <input type="text" placeholder="Enter your name" id="Name" required><br><br>
    <label for="Surname">Surname: </label>
    <input type="text" placeholder="Enter your surname" id="Surname" required><br><br>
    <label for="Email">Email: </label>
    <input type="email" placeholder="example@gmail.com" id="Email" required><br><br>
    <label for="password">Password: </label>
    <input type="password" id="password" placeholder="••••••••" required><br><br>
    <input type="checkbox" id="a">
    <label for="a">Remember id</label><br><br>
    <div>
        <label for="choice"><small>What field do you want to study?</small></label>
        <br>
        <select name="choice" id="choice" required style="width: 200px;">
            <option value="" disabled selected hidden>Choose one</option>
            <option>Fullstack developer</option>
            <option>Frontend developer</option>
            <option>Backend developer</option>
        </select>
    </div><br>
    <div >
        <label for="title">Sex: </label>

        <input type="radio" id="m" name="title" value="m" >
        <label for="m">Male</label>

        <input type="radio" id="f" name="title" value="f">
        <label for="f">Female</label>

        <input type="radio" id="o" name="title" value="o">
        <label for="o">Other</label>
    </div><br>
    
    <label for="profile">Profile Photo</label><br>
    <input type="file" accept="image/png,image/jpg,image/jpeg," id="profile">
    <br><br>
    <label for="info"><small>Short information about yourself</small></label><br>
    <textarea id="info" rows="3" cols="25" required></textarea><br><br>
    <hr><input type="reset">
    <input type="submit" style="margin-bottom: 10px;">
</form>    
</body>
</html>
